version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: socialsense-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialsense
    ports:
      - "5034:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socialsense-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: socialsense-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - socialsense-network

volumes:
  postgres_data:

networks:
  socialsense-network:
    driver: bridge
